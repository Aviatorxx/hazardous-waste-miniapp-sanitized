app:
  thermal:
    image:
      storage-path: src/main/resources/static/thermal-images/
      base-url: /api/thermal-properties/image/
      max-size: 10485760
      allowed-types: image/jpeg,image/png,image/jpg
      allowed-extensions: .jpg,.jpeg,.png
